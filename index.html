<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>whoisdaity</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  height:100vh;
  background: radial-gradient(circle at center, #111 0%, #000 70%);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.container{
  max-width:600px;
  animation:fadeIn 1.5s ease forwards;
}

h1{
  font-size:3rem;
  letter-spacing:4px;
  font-weight:700;
}

.subtitle{
  margin-top:10px;
  opacity:0.6;
  font-weight:300;
  margin-bottom:40px;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  margin:10px;
  border:1px solid white;
  text-decoration:none;
  color:white;
  transition:0.3s;
  font-size:0.9rem;
  letter-spacing:1px;
}

.btn:hover{
  background:white;
  color:black;
  transform:scale(1.05);
}

.footer{
  position:absolute;
  bottom:20px;
  width:100%;
  font-size:0.75rem;
  opacity:0.4;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>WHO IS DAITY?</h1>
  <div class="subtitle">
    Jugador. Pensador. Overthinker profesional.
  </div>

  <a href="#" class="btn">Sobre mí</a>
  <a href="#" class="btn">Proyectos</a>
  <a href="#" class="btn">Contacto</a>
</div>

<div class="footer">
  © 2026 daity
</div>

</body>
</html>
