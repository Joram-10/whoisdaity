<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO IS DAITY?</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* CONFIGURACIÓN GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505; /* Fondo negro profundo */
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CAPA DE PARTÍCULAS (FONDO) */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* TARJETA PRINCIPAL (ESTILO VIDRIO) */
        .main-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            transition: 0.3s;
        }

        .main-card:hover {
            border: 1px solid rgba(163, 102, 255, 0.3);
            transform: translateY(-5px);
        }

        /* SPRITE DE GENGAR */
        .pokemon-sprite {
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(163, 102, 255, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        .pokemon-sprite img {
            width: 90px;
            height: auto;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* TEXTO */
        .title {
            font-size: 2.2rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        #typewriter-text {
            color: #888;
            font-size: 1rem;
            min-height: 1.5em;
            margin-bottom: 25px;
        }

        /* POKEMMO TRAINER CARD */
        .trainer-status {
            background: rgba(0, 255, 136, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border-left: 4px solid #00ff88;
            text-align: left;
        }

        .status-badge {
            font-size: 0.7rem;
            font-weight: bold;
            color: #00ff88;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .trainer-info p {
            font-size: 0.8rem;
            color: #bbb;
            margin: 2px 0;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0); }
        }

        /* BOTONES */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.01);
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="main-card">
        <div class="pokemon-sprite">
            <img src="https://projectpokemon.org/images/shiny-sprites/gengar.gif" alt="Gengar Shiny">
        </div>

        <h1 class="title">WHO IS DAITY?</h1>
        <div id="typewriter-text"></div>

        <div class="trainer-status">
            <div class="status-badge">
                <span class="pulse"></span> ONLINE EN POKEMMO
            </div>
            <div class="trainer-info">
                <p>Región: <strong>Teselia</strong></p>
                <p>Main: <strong>Dragonite</strong></p>
            </div>
        </div>

        <nav class="button-group">
            <a href="https://github.com/Joram-10" target="_blank" class="btn">PORTFOLIO (GITHUB)</a>
            <a href="#" class="btn">SOBRE MÍ</a>
            <a href="#" class="btn">CONTACTO</a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <script>
        // Efecto de escritura
        const textElement = document.getElementById('typewriter-text');
        new Typewriter(textElement, {
            strings: ['Jugador de PokeMMO.', 'Estudiante de Software.', 'Overthinker profesional.'],
            autoStart: true,
            loop: true,
            delay: 50,
            deleteSpeed: 30
        });

        // Fondo de partículas
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 90, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.4 } } }
            }
        });
    </script>
</body>
</html>

</body>

</html>
